<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Client Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1280px;
            height: 720px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 80px;
            position: relative;
            text-align: center;
        }

        .background-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(46, 204, 113, 0.05) 25%, rgba(46, 204, 113, 0.05) 26%, transparent 27%, transparent 74%, rgba(46, 204, 113, 0.05) 75%, rgba(46, 204, 113, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(46, 204, 113, 0.05) 25%, rgba(46, 204, 113, 0.05) 26%, transparent 27%, transparent 74%, rgba(46, 204, 113, 0.05) 75%, rgba(46, 204, 113, 0.05) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .accent-circle {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.12) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            filter: blur(50px);
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .icon-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #2ecc71;
        }

        .icon-label {
            font-size: 12px;
            color: #333;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        h1 {
            font-size: 76px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 15px;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .highlight {
            color: #2ecc71;
        }

        .subline {
            font-size: 26px;
            color: #666666;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            margin-bottom: 50px;
            letter-spacing: 0.3px;
        }

        .badge {
            display: inline-block;
            background: #2ecc71;
            color: #ffffff;
            padding: 16px 36px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.3);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #2ecc71;
            margin: 0 auto 30px;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="accent-circle"></div>

    <div class="container">
        <div class="content">
            <div class="icon-row">
                <div class="icon-item">
                    <div class="icon-box">📋</div>
                    <div class="icon-label">Invoices</div>
                </div>
                <div class="icon-item">
                    <div class="icon-box">👥</div>
                    <div class="icon-label">Clients</div>
                </div>
                <div class="icon-item">
                    <div class="icon-box">💰</div>
                    <div class="icon-label">Revenue</div>
                </div>
            </div>

            <h1>Freelancer<br><span class="highlight">Client Tracker</span></h1>

            <div class="divider"></div>

            <div class="subline">Notion Template | Invoices • Clients • Revenue</div>

            <div class="badge">$39 — Replace FreshBooks</div>
        </div>
    </div>
</body>
</html>
