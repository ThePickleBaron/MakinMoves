<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 AI Prompts for Freelancers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1280px;
            height: 720px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 80px;
            position: relative;
            text-align: center;
        }

        .background-decoration {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            filter: blur(40px);
        }

        .background-decoration-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            filter: blur(40px);
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .highlight {
            color: #00d4ff;
        }

        .subline {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .decorative-line {
            width: 100px;
            height: 3px;
            background: #00d4ff;
            margin: 0 auto 25px;
        }
    </style>
</head>
<body>
    <div class="background-decoration"></div>
    <div class="background-decoration-2"></div>

    <div class="container">
        <div class="content">
            <div class="icon-container">
                <div class="icon">💡</div>
                <div class="icon">⚡</div>
                <div class="icon">🎯</div>
            </div>

            <h1>50 AI Prompts<br><span class="highlight">for Freelancers</span></h1>

            <div class="decorative-line"></div>

            <div class="subline">Copy-Paste Ready | ChatGPT + Claude</div>

            <div class="badge">$24 — Save 5+ Hours/Week</div>
        </div>
    </div>
</body>
</html>
