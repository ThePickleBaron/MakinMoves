name: MakinMoves Orchestrator

on:
  schedule:
    # Run every 4 hours (6 times/day)
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r shared/agent/requirements.txt

      - name: Run orchestrator
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          cd shared/agent
          python orchestrator.py

      - name: Commit changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Orchestrator Bot"
          git add shared/logs/ shared/metrics/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Orchestrator: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi
